kind = "web"
previewPath = "/"
title = "Arizona Mobile Notary"
version = "1.0.0"
id = "artifacts/arizona-mobile-notary"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19311

[services.development]
run = "pnpm --filter @workspace/arizona-mobile-notary run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arizona-mobile-notary", "run", "build" ]
publicDir = "artifacts/arizona-mobile-notary/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19311"
BASE_PATH = "/"
